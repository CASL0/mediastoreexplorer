build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: true

style:
  # Compose の dp 値などで頻出するためオフ
  MagicNumber:
    active: false
  # Compose の末尾ラムダスタイルと衝突するためオフ
  TrailingWhitespace:
    active: true
  # @Preview 関数は Android Studio のプレビューから呼ばれるため未使用判定の対象外とする
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'PreviewLightDark'
      - 'PreviewScreenSizes'

complexity:
  # Composable で ViewModel を集約して受け取るユースケースは慣用のため除外
  LongParameterList:
    ignoreAnnotated:
      - 'Composable'

naming:
  FunctionNaming:
    # Compose の Composable 関数は大文字始まりを許容
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
